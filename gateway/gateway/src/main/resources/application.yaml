server:
  port: 8089

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      # --- CẤU HÌNH CORS TẠI ĐÂY ---
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      # ----------------------------
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/oauth2/**,/login/oauth2/**

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**,/api/admin/users/**

        - id: product-service-public
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/public/**

        - id: product-service-admin
          uri: http://localhost:8083
          predicates:
            - Path=/api/admin/products/**,/api/admin/categories/**,/api/products/**

        - id: cart-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/cart/**

        - id: order-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/orders/**,/api/admin/orders/**

        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/payments/**,/api/admin/payments/**

        - id: inventory-service-admin
          uri: http://localhost:8087
          predicates:
            - Path=/api/admin/inventory/**

        - id: inventory-service-internal
          uri: http://localhost:8087
          predicates:
            - Path=/api/inventory/**

        - id: notification-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/notifications/**

jwt:
  secret: 1234567890123456789012345678901234567890123456789012345678901234