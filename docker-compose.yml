version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: novagear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - novagear-network

  redis:
    image: redis:7
    container_name: novagear-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - novagear-network

  auth-service:
    build:
      context: ./backend/Auth
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8081"
    networks:
      - novagear-network

  user-service:
    build:
      context: ./backend/User
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8082:8082"
    networks:
      - novagear-network

  product-service:
    build:
      context: ./backend/Product
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8083:8083"
    networks:
      - novagear-network

  cart-service:
    build:
      context: ./backend/Cart
      dockerfile: Dockerfile
    container_name: cart-service
    restart: unless-stopped
    depends_on:
      - postgres
      - product-service
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cart_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVICES_PRODUCT_SERVICE_URL: http://product-service:8083
    ports:
      - "8084:8084"
    networks:
      - novagear-network

  inventory-service:
    build:
      context: ./backend/Inventory
      dockerfile: Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - product-service
      - notification-service
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVICES_PRODUCT_SERVICE_URL: http://product-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    ports:
      - "8085:8085"
    networks:
      - novagear-network

  order-service:
    build:
      context: ./backend/Order
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    depends_on:
      - postgres
      - cart-service
      - inventory-service
      - product-service
      - notification-service
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVICES_CART_SERVICE_URL: http://cart-service:8084
      SERVICES_INVENTORY_SERVICE_URL: http://inventory-service:8085
      SERVICES_PRODUCT_SERVICE_URL: http://product-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    ports:
      - "8086:8086"
    networks:
      - novagear-network

  payment-service:
    build:
      context: ./backend/Payment
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - order-service
      - notification-service
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVICES_ORDER_SERVICE_URL: http://order-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
      PAYOS_RETURN_URL: http://localhost:5173/payment/result
      PAYOS_CANCEL_URL: http://localhost:5173/order
    ports:
      - "8087:8087"
    networks:
      - novagear-network

  notification-service:
    build:
      context: ./backend/Notification
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REALTIME_REDIS_CHANNEL: realtime-events
      FEATURES_REDIS_REALTIME_ENABLED: "true"
    ports:
      - "8088:8088"
    networks:
      - novagear-network

  gateway-service:
    build:
      context: ./gateway/gateway
      dockerfile: Dockerfile
    container_name: gateway-service
    restart: unless-stopped
    depends_on:
      - auth-service
      - user-service
      - product-service
      - cart-service
      - inventory-service
      - order-service
      - payment-service
      - notification-service
    environment:
      SERVER_PORT: 8080

      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      PRODUCT_SERVICE_URL: http://product-service:8083
      CART_SERVICE_URL: http://cart-service:8084
      INVENTORY_SERVICE_URL: http://inventory-service:8085
      ORDER_SERVICE_URL: http://order-service:8086
      PAYMENT_SERVICE_URL: http://payment-service:8087
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    ports:
      - "8080:8080"
    networks:
      - novagear-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: novagear-frontend
    restart: unless-stopped
    depends_on:
      - gateway-service
    ports:
      - "5173:80"
    networks:
      - novagear-network

volumes:
  postgres_data:

networks:
  novagear-network:
    driver: bridge