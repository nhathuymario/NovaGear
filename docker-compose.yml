services:
  postgres:
    image: postgres:16
    container_name: novagear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - novagear-network

  redis:
    image: redis:7
    container_name: novagear-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - novagear-network

  kafka:
    image: apache/kafka:4.1.2
    container_name: novagear-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - novagear-network

  loki:
    image: grafana/loki:3.1.1
    container_name: novagear-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./docker/observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks:
      - novagear-network

  promtail:
    image: grafana/promtail:3.1.1
    container_name: novagear-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./docker/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/novagear
    networks:
      - novagear-network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: novagear-grafana
    restart: unless-stopped
    depends_on:
      - loki
    ports:
      - "3000:3000"
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - novagear-network

  auth-service:
    build:
      context: ./backend/Auth
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      LOGGING_FILE_NAME: /app/logs/auth-service.log
    ports:
      - "8081:8081"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  user-service:
    build:
      context: ./backend/User
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      LOGGING_FILE_NAME: /app/logs/user-service.log
    ports:
      - "8082:8082"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  product-service:
    build:
      context: ./backend/Product
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      UPLOAD_DIR: /app/uploads
      LOGGING_FILE_NAME: /app/logs/product-service.log
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "8083:8083"
    networks:
      - novagear-network

  cart-service:
    build:
      context: ./backend/Cart
      dockerfile: Dockerfile
    container_name: cart-service
    restart: unless-stopped
    depends_on:
      - postgres
      - product-service
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cart_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVICES_PRODUCT_SERVICE_URL: http://product-service:8083
      LOGGING_FILE_NAME: /app/logs/cart-service.log
    ports:
      - "8084:8084"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  inventory-service:
    build:
      context: ./backend/Inventory
      dockerfile: Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - product-service
      - notification-service
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVICES_PRODUCT_SERVICE_URL: http://product-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
      LOGGING_FILE_NAME: /app/logs/inventory-service.log
    ports:
      - "8085:8085"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  order-service:
    build:
      context: ./backend/Order
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    depends_on:
      - postgres
      - cart-service
      - inventory-service
      - product-service
      - notification-service
      - kafka
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVICES_CART_SERVICE_URL: http://cart-service:8084
      SERVICES_INVENTORY_SERVICE_URL: http://inventory-service:8085
      SERVICES_PRODUCT_SERVICE_URL: http://product-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_NOTIFICATION_TOPIC: novagear.notifications
      FEATURES_KAFKA_NOTIFICATIONS_ENABLED: "true"
      LOGGING_FILE_NAME: /app/logs/order-service.log
    ports:
      - "8086:8086"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  payment-service:
    build:
      context: ./backend/Payment
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - order-service
      - notification-service
      - kafka
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVICES_ORDER_SERVICE_URL: http://order-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
      PAYOS_RETURN_URL: http://localhost:${FRONTEND_PORT:-5180}/payment/result
      PAYOS_CANCEL_URL: http://localhost:${FRONTEND_PORT:-5180}/payment/result
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_NOTIFICATION_TOPIC: novagear.notifications
      FEATURES_KAFKA_NOTIFICATIONS_ENABLED: "true"
      LOGGING_FILE_NAME: /app/logs/payment-service.log
    ports:
      - "8087:8087"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  shipping-service:
    build:
      context: ./backend/Shipping
      dockerfile: Dockerfile
    container_name: shipping-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8090
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shipping_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      LOGGING_FILE_NAME: /app/logs/shipping-service.log
    ports:
      - "8090:8090"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  notification-service:
    build:
      context: ./backend/Notification
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      REALTIME_REDIS_CHANNEL: realtime-events
      FEATURES_REDIS_REALTIME_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_NOTIFICATION_TOPIC: novagear.notifications
      FEATURES_KAFKA_NOTIFICATIONS_ENABLED: "true"
      LOGGING_FILE_NAME: /app/logs/notification-service.log
    ports:
      - "8088:8088"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  gateway-service:
    build:
      context: ./gateway/gateway
      dockerfile: Dockerfile
    container_name: gateway-service
    restart: unless-stopped
    depends_on:
      - auth-service
      - user-service
      - product-service
      - cart-service
      - inventory-service
      - order-service
      - payment-service
      - shipping-service
      - notification-service
    environment:
      SERVER_PORT: 8080

      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      PRODUCT_SERVICE_URL: http://product-service:8083
      CART_SERVICE_URL: http://cart-service:8084
      INVENTORY_SERVICE_URL: http://inventory-service:8085
      ORDER_SERVICE_URL: http://order-service:8086
      PAYMENT_SERVICE_URL: http://payment-service:8087
      SHIPPING_SERVICE_URL: http://shipping-service:8090
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
      LOGGING_FILE_NAME: /app/logs/gateway-service.log
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - novagear-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: novagear-frontend
    restart: unless-stopped
    depends_on:
      - gateway-service
    ports:
      - "${FRONTEND_PORT:-5180}:80"
    networks:
      - novagear-network

volumes:
  postgres_data:
  kafka_data:
  grafana_data:
  loki_data:

networks:
  novagear-network:
    driver: bridge
