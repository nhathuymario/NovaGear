server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ${User:YOUR_CLIENT_ID_HERE}
    password: ${Password:YOUR_CLIENT_ID_HERE}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_CLIENT_ID_HERE}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_SECRET_HERE}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

jwt:
  secret: ${JWT_SECRET:default_secret_key_at_least_32_chars}
  access-expiration: 86400000
  refresh-expiration: 604800000