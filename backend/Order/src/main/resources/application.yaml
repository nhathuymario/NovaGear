server:
  port: 8085

spring:
  application:
    name: order-service
  
  profiles:
    active: seed

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 60s
      cache-null-values: false

  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

services:
  cart:
    url: http://localhost:8084
  inventory:
    url: http://localhost:8087

realtime:
  redis:
    channel: ${REALTIME_REDIS_CHANNEL:novagear:realtime}
