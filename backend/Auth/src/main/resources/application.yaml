server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-dev-google-client-secret}
            scope:
              - openid
              - profile
              - email
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8089/login/oauth2/code/{registrationId}}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: 1234567890123456789012345678901234567890123456789012345678901234
  access-expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    org.hibernate.SQL: DEBUG