server:
  port: 8086

spring:
  application:
    name: payment-service

  profiles:
    active: seed

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

services:
  order-service:
    url: http://localhost:8085

payos:
  api-key: ${PAYOS_API_KEY:SANDBOX_API_KEY}
  client-id: ${PAYOS_CLIENT_ID:SANDBOX_CLIENT_ID}
  checksum-key: ${PAYOS_CHECKSUM_KEY:}
  api-url: ${PAYOS_API_URL:https://api-merchant.payos.vn}
  checkout-path: ${PAYOS_CHECKOUT_PATH:/v2/payment-requests}
  return-url: ${PAYOS_RETURN_URL:http://localhost:5173/payment/result}
  cancel-url: ${PAYOS_CANCEL_URL:http://localhost:5173/order}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: debug