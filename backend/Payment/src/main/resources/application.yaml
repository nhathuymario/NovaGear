server:
  port: 8086

spring:
  application:
    name: payment-service

  profiles:
    active: seed

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

services:
  order-service:
    url: http://localhost:8085

payos:
  api-key: ${PAYOS_API_KEY:SANDBOX_API_KEY}
  client-id: ${PAYOS_CLIENT_ID:SANDBOX_CLIENT_ID}
  checksum-key: ${PAYOS_CHECKSUM_KEY:}
  mock-enabled: ${PAYOS_MOCK_ENABLED:false}
  api-url: ${PAYOS_API_URL:https://api-merchant.payos.vn}
  checkout-path: ${PAYOS_CHECKOUT_PATH:/v2/payment-requests}
  return-url: ${PAYOS_RETURN_URL:http://localhost:5173/payment/result}
  cancel-url: ${PAYOS_CANCEL_URL:http://localhost:5173/payment/result}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  kafka:
    notification-topic: ${APP_KAFKA_NOTIFICATION_TOPIC:novagear.notifications}

features:
  kafka-notifications-enabled: ${FEATURES_KAFKA_NOTIFICATIONS_ENABLED:false}

logging:
  file:
    name: ${LOGGING_FILE_NAME:logs/payment-service.log}
  level:
    org.hibernate.SQL: debug
    org.springframework.security: debug
